openapi: 3.0.4
info:
  title: SUI Custodians Data API
  version: '1.0'
  description: |
    The Custodians API is part of the Single Unique Identifier (SUI)
    Multi Agency Information sharing (MAIS) programme for children's social care.

    It provides an interface to retrieve records of data associated with a given
    SUI, to enable presenting and/or analysing this data for the improved
    safeguarding of children.

paths:
  '/api/v1/records/ChildPersonalDetailsRecordV1/{sui}':
    get:
      parameters:
        - name: sui
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Record found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChildPersonalDetailsEnvelopeV1'
        '400':
          description: Required parameters are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  '/api/v1/records/ChildSocialCareDetailsRecordV1/{sui}':
