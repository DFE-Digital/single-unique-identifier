            application/json:
              schema:
                $ref: '#/components/schemas/EducationAttendanceHistoryEnvelopeV1'
        '400':
          description: Required parameters are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Record not found.
          content:
            application/json:
