name: Load Terraform vars
description: Reads environment values from a tfvars file and computes backend naming

inputs:
  environment:
    description: Environment name (matches tfvars filename without extension)
    required: true
  terraform-dir:
    description: Path to terraform directory
    required: false
    default: terraform
  container-name:
    description: Terraform state container name
    required: false
    default: tfstate

outputs:
  subscription_prefix:
    description: subscription_prefix from tfvars
    value: ${{ steps.load.outputs.subscription_prefix }}
  environment_id:
    description: environment_id from tfvars
    value: ${{ steps.load.outputs.environment_id }}
  region_short:
    description: region_short from tfvars
    value: ${{ steps.load.outputs.region_short }}
  location:
    description: location from tfvars
    value: ${{ steps.load.outputs.location }}
  product:
    description: Product tag value
    value: ${{ steps.load.outputs.product }}
  service_offering:
    description: Service_Offering tag value
    value: ${{ steps.load.outputs.service_offering }}
  tfvars_path:
    description: Relative path to the tfvars file
    value: ${{ steps.load.outputs.tfvars_path }}
  state_rg:
    description: Derived state resource group name
    value: ${{ steps.load.outputs.state_rg }}
  state_storage:
    description: Derived state storage account name
    value: ${{ steps.load.outputs.state_storage }}
  state_container:
    description: State container name
    value: ${{ steps.load.outputs.state_container }}
  state_key:
    description: State key path
    value: ${{ steps.load.outputs.state_key }}

runs:
  using: composite
  steps:
    - id: load
      name: Load tfvars and compute backend names
      shell: bash
      run: |
        TFVARS_PATH="${{ inputs.terraform-dir }}/environments/${{ inputs.environment }}.tfvars"

        if [ ! -f "$TFVARS_PATH" ]; then
          echo "Missing tfvars: $TFVARS_PATH"
          exit 1
        fi

        get_tfvar() {
          awk -F '=' -v key="$1" '
            $0 !~ /^#/ && $1 ~ key {
              gsub(/^[ \t]+|[ \t]+$/, "", $2);
              gsub(/"/, "", $2);
              print $2;
              exit
            }' "$TFVARS_PATH"
        }

        SUBSCRIPTION_PREFIX=$(get_tfvar subscription_prefix)
        ENVIRONMENT_ID=$(get_tfvar environment_id)
        REGION_SHORT=$(get_tfvar region_short)
        LOCATION=$(get_tfvar location)
        PRODUCT=$(get_tfvar product)
        SERVICE_OFFERING=$(get_tfvar service_offering)

        missing=()
        [ -z "$SUBSCRIPTION_PREFIX" ] && missing+=("subscription_prefix")
        [ -z "$ENVIRONMENT_ID" ] && missing+=("environment_id")
        [ -z "$REGION_SHORT" ] && missing+=("region_short")
        [ -z "$LOCATION" ] && missing+=("location")
        [ -z "$PRODUCT" ] && missing+=("product")
        [ -z "$SERVICE_OFFERING" ] && missing+=("service_offering")

        if [ "${#missing[@]}" -gt 0 ]; then
          echo "Missing required values in $TFVARS_PATH: ${missing[*]}"
          exit 1
        fi

        STATE_RG="${SUBSCRIPTION_PREFIX}${ENVIRONMENT_ID}rg-${REGION_SHORT}-tfstate"
        STATE_STORAGE="${SUBSCRIPTION_PREFIX}${ENVIRONMENT_ID}sttfstate01"
        STATE_CONTAINER="${{ inputs.container-name }}"
        STATE_KEY="${ENVIRONMENT_ID}/terraform.tfstate"

        {
          echo "subscription_prefix=$SUBSCRIPTION_PREFIX"
          echo "environment_id=$ENVIRONMENT_ID"
          echo "region_short=$REGION_SHORT"
          echo "location=$LOCATION"
          echo "product=$PRODUCT"
          echo "service_offering=$SERVICE_OFFERING"
          echo "tfvars_path=environments/${{ inputs.environment }}.tfvars"
          echo "state_rg=$STATE_RG"
          echo "state_storage=$STATE_STORAGE"
          echo "state_container=$STATE_CONTAINER"
          echo "state_key=$STATE_KEY"
        } >> "$GITHUB_OUTPUT"
