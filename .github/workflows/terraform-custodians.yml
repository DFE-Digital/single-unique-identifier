name: Terraform Custodians
run-name: Terraform Custodians - ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: d01
        type: choice
        options:
          - d01
          - d02
      apply:
        description: Apply changes (otherwise plan only)
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform Custodians for ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})
    uses: ./.github/workflows/terraform-plan-and-apply.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}
      root: terraform/custodians
      state_key: ${{ format('{0}/custodians.tfstate', inputs.environment) }}
