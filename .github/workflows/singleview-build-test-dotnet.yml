name: Build and Test "SingleView" Solution

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for deployment
        required: false
        default: d01
        type: choice
        options:
          - d01
      deploy:
        description: Deploy to Azure Web App
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "Apps/SingleView/**"
  pull_request:
    branches:
      - main
    paths:
      - "Apps/SingleView/**"

jobs:
  build-and-test-SingleView:
    name: SingleView - Build Test Dotnet
    uses: ./.github/workflows/build-test-dotnet.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      checks: write
      packages: read
    with:
      directory_name: Apps/SingleView

  deploy-singleview:
    name: SingleView - Deploy Web App
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    needs: build-and-test-SingleView
    uses: ./.github/workflows/deploy-dotnet-webapp.yml
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}
      service_prefix: sv
      project_path: Apps/SingleView/src/SUI.SingleView.Web/SUI.SingleView.Web.csproj
      package_path: publish
      dotnet_version: "9.0.x"
