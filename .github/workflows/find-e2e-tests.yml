name: Find E2E Tests
run-name: >-
  Find E2E - ${{
    github.event_name == 'workflow_run' &&
    format('dev:d01 (auto from {0} on {1})', github.event.workflow_run.name, github.event.workflow_run.head_branch) ||
    github.event_name == 'workflow_dispatch' &&
    format(
      'dev:{0} ephemeral:{1} (manual)',
      inputs.manual_run_dev && inputs.environment || 'false',
      inputs.manual_run_ephemeral
    ) ||
    github.event_name == 'pull_request' &&
    format('ephemeral (auto from PR {0})', github.head_ref || github.ref_name) ||
    format('ephemeral (auto from {0} {1})', github.event_name, github.ref_name)
  }}

permissions:
  contents: read
  actions: read
  checks: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for dev E2E tests (tfvars name)
        required: false
        default: d01
        type: choice
        options:
          - d01
          - d02
      manual_run_ephemeral:
        description: e2e test 'ephemeral' environment
        default: true
        type: boolean
      manual_run_dev:
        description: e2e test 'dev' environment
        default: false
        type: boolean

  workflow_run:
    workflows:
      - Terraform Core Infrastructure
      - Terraform Find
      - Terraform Custodians
      - 'Build, Test, Deploy: "Find" Solution'
      - 'Build, Test, Deploy: "Custodians" Solution'
    types: [completed]

  push:
    branches:
      - main
    paths:
      - "Apps/Find/**"
      - "Apps/StubCustodians/**"
      - .github/workflows/find-e2e-tests.yml

  pull_request:
    branches:
      - main
    paths:
      - "Apps/Find/**"
      - "Apps/StubCustodians/**"
      - .github/workflows/find-e2e-tests.yml

concurrency:
  # Do not allow e2e tests to run concurrently against dev
  # Use a fixed group only when running dev E2E (successful workflow_run on main, or manual dev run);
  # otherwise use a per-run group so ephemeral tests don't block each other.
  group: ${{ ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.manual_run_dev == true)) && 'e2e-test-dev' || format('e2e-test-run-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  # For manual workflow runs (workflow_dispatch) give the user the option of where to run against (ephemeral/dev/both)
  # Otherwise, run against ephemeral for push/PR, and against dev after successful workflow runs on main.
  eval-workflow-setup:
    name: Evaluate run targets
    # Runner labels from RUNNER_LABELS (JSON array). Default: ubuntu-latest.
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - id: eval
        name: Evaluate Workflow Setup
        env:
          RUN_EPHEMERAL: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || inputs.manual_run_ephemeral == true }}
          RUN_DEV: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || inputs.manual_run_dev == true }}
        run: |
          echo
          echo "run_ephemeral=$RUN_EPHEMERAL" >> "$GITHUB_OUTPUT"
          echo "run_dev=$RUN_DEV" >> "$GITHUB_OUTPUT"

          echo "---- GitHub Context Info: ----"
          echo "github.event_name: ${{ github.event_name || '(no value)' }}"
          echo "github.event.workflow_run.event: ${{ github.event.workflow_run.event || '(no value)' }}"
          echo "github.event.workflow_run.conclusion: ${{ github.event.workflow_run.conclusion || '(no value)' }}"
          echo "github.event.workflow_run.head_branch: ${{ github.event.workflow_run.head_branch || '(no value)' }}"
          echo "inputs.environment: ${{ inputs.environment || '(no value)' }}"
          echo "inputs.manual_run_ephemeral: ${{ inputs.manual_run_ephemeral || '(no value)' }}"
          echo "inputs.manual_run_dev: ${{ inputs.manual_run_dev || '(no value)' }}"
          echo
          echo "---- Evaluated Workflow Setup: ----"
          echo "RUN_EPHEMERAL: $RUN_EPHEMERAL"
          echo "RUN_DEV: $RUN_DEV"
    outputs:
      run_ephemeral: ${{ steps.eval.outputs.run_ephemeral }}
      run_dev: ${{ steps.eval.outputs.run_dev }}

  e2e-test-ephemeral:
    name: E2E tests (ephemeral)
    needs: eval-workflow-setup
    # Runner labels from RUNNER_LABELS (JSON array). Default: ubuntu-latest.
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    if: needs.eval-workflow-setup.outputs.run_ephemeral == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node.js (for Azurite and Functions tools)
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install and start Azurite
        run: |
          npm i -g azurite
          azurite \
            --blobHost 127.0.0.1 --blobPort 10000 \
            --queueHost 127.0.0.1 --queuePort 10001 \
            --tableHost 127.0.0.1 --tablePort 10002 \
            --location /tmp/azurite \
            --debug /tmp/azurite/debug.log &
          for port in 10000 10001 10002; do
            for i in {1..20}; do
              (echo > /dev/tcp/127.0.0.1/$port) >/dev/null 2>&1 && break
              sleep 0.5
            done
          done

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4

      - name: Build Find Solution
        run: dotnet build Apps/Find/SUI.Find.slnx

      - name: Build StubCustodians Solution
        run: dotnet build Apps/StubCustodians/SUI.StubCustodians.slnx

      - name: Create local.settings.json for Find API
        run: |
          cp Apps/Find/src/SUI.Find.FindApi/example.local.settings.json \
             Apps/Find/src/SUI.Find.FindApi/local.settings.json

      - name: Start StubCustodians API
        run: dotnet run --launch-profile http &
        working-directory: Apps/StubCustodians/src/SUI.StubCustodians.API

      - name: Start Find API
        run: func start --port 7182 &
        env:
          StubCustodiansBaseUrl: http://localhost:5193
        working-directory: Apps/Find/src/SUI.Find.FindApi

      - name: Run E2E Tests (against ephemeral environment)
        run: |
          dotnet test Apps/Find/tests/SUI.Find.E2ETests/SUI.Find.E2ETests.csproj \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=e2e-ephemeral.trx" \
            --results-directory TestResults \
            -e E2E__BaseUrl=http://localhost:7182/api/ \
            -e E2E__StubCustodiansBaseUrl=http://localhost:5193/api/ \
            -e E2E__SkipResetAzureTables=False

      - name: Publish E2E test summary (ephemeral)
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v2
        with:
          name: Find E2E (ephemeral)
          path: TestResults/e2e-ephemeral.trx
          reporter: dotnet-trx
          fail-on-error: false

  e2e-test-dev:
    name: E2E tests (dev ${{ inputs.environment || 'd01' }})
    needs: eval-workflow-setup
    # Runner labels from RUNNER_LABELS (JSON array). Default: ubuntu-latest.
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    if: needs.eval-workflow-setup.outputs.run_dev == 'true'
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment || 'd01' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load tfvars for ${{ env.TARGET_ENVIRONMENT }}
        id: env_config
        uses: ./.github/actions/load-tfvars
        with:
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run E2E Tests (against dev environment)
        run: |
          dotnet test Apps/Find/tests/SUI.Find.E2ETests/SUI.Find.E2ETests.csproj \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=e2e-dev.trx" \
            --results-directory TestResults \
            -e E2E__BaseUrl=https://${{ steps.env_config.outputs.subscription_prefix }}${{ steps.env_config.outputs.environment_id }}func-${{ steps.env_config.outputs.region_short }}-find01.azurewebsites.net/api/ \
            -e E2E__StubCustodiansBaseUrl=https://${{ steps.env_config.outputs.subscription_prefix }}${{ steps.env_config.outputs.environment_id }}app-${{ steps.env_config.outputs.region_short }}-custodians01.azurewebsites.net/api/ \
            -e E2E__SkipResetAzureTables=True

      - name: Publish E2E test summary (dev)
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v2
        with:
          name: Find E2E (dev)
          path: TestResults/e2e-dev.trx
          reporter: dotnet-trx
          fail-on-error: false
