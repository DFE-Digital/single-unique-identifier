name: Find E2E Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Apps/Find/**"
  pull_request:
    branches:
      - main
    paths:
      - "Apps/Find/**"

jobs:
  e2e-test-ephemeral:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4

      - name: Install Azurite
        run: npm install -g azurite

      - name: run azurite
        run: azurite --silent &

      - name: Build Find Solution
        run: dotnet build Apps/Find/SUI.Find.slnx

      - name: Build StubCustodians Solution
        run: dotnet build Apps/StubCustodians/SUI.StubCustodians.slnx

      - name: Create local.settings.json for Find API
        run: |
          cp Apps/Find/src/SUI.Find.FindApi/example.local.settings.json \
             Apps/Find/src/SUI.Find.FindApi/local.settings.json

      - name: Start StubCustodians API
        run: dotnet run --launch-profile http &
        working-directory: Apps/StubCustodians/src/SUI.StubCustodians.API

      - name: Start Find API
        run: func start --port 7182 &
        env:
          StubCustodiansBaseUrl: http://localhost:5193
        working-directory: Apps/Find/src/SUI.Find.FindApi

      - name: Wait for Find API to start
        run: |
          for i in {1..30}; do
           if curl -sf http://localhost:7182/api/health; then
              echo "Find API is ready"
              exit 0
           fi
            sleep 2
          done
          echo "Find API failed to start"
          exit 1

      - name: Wait for StubCustodians API to start
        run: |
          for i in {1..30}; do
           if curl -sf http://localhost:5193/api/health; then
              echo "StubCustodians API is ready"
              exit 0
           fi
            sleep 2
          done
          echo "StubCustodians API failed to start"
          exit 1

      - name: Run E2E Tests (against ephemeral environment)
        run: dotnet test Apps/Find/tests/SUI.Find.E2ETests/SUI.Find.E2ETests.csproj --logger "console;verbosity=detailed"

  e2e-test-dev:
    runs-on: ubuntu-latest
    # rs-todo: only trigger after successfull deployment to main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      
      # rs-todo: wrap on multiple lines, ideally:
      - name: Run E2E Tests (against dev environment)
        run: dotnet test Apps/Find/tests/SUI.Find.E2ETests/SUI.Find.E2ETests.csproj --logger "console;verbosity=detailed" -e E2E__BaseUrl=https://s270d01func-ukw-find01.azurewebsites.net/api/ -e E2E__SkipResetAzureTables=True
