name: Find E2E Tests
run-name: >-
  Find E2E - ${{
    (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') &&
    format('dev:d01 (auto from {0} on {1})', github.event.workflow_run.name, github.event.workflow_run.head_branch) ||
    github.event_name == 'workflow_run' &&
    format('skipped (auto from {0} on {1})', github.event.workflow_run.name, github.event.workflow_run.head_branch) ||
    github.event_name == 'workflow_dispatch' &&
    format(
      'dev:{0} ephemeral:{1} (manual)',
      inputs.manual_run_dev && inputs.environment || 'false',
      inputs.manual_run_ephemeral
    ) ||
    github.event_name == 'pull_request' &&
    format('ephemeral (auto from PR {0})', github.head_ref || github.ref_name) ||
    format('ephemeral (auto from {0} {1})', github.event_name, github.ref_name)
  }}

permissions:
  contents: read
  actions: read
  checks: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for dev E2E tests (tfvars name)
        required: false
        default: d01
        type: choice
        options:
          - d01
          - d02
          - d03
      manual_run_ephemeral:
        description: e2e test 'ephemeral' environment
        default: true
        type: boolean
      manual_run_dev:
        description: e2e test 'dev' environment
        default: false
        type: boolean

  workflow_run:
    workflows:
      - Terraform Core Infrastructure
      - Terraform Find
      - Terraform Custodians
      - 'Build, Test, Deploy: "Find" Solution'
      - 'Build, Test, Deploy: "Custodians" Solution'
      - 'Build, Test, Deploy: "Auth Emulator" Solution'
    branches: [main]
    types: [completed]

  push:
    branches:
      - main
    paths:
      - "Apps/Find/**"
      - "Apps/StubCustodians/**"
      - "Apps/AuthEmulator/**"
      - "Data/**"
      - .github/workflows/find-e2e-tests.yml

  pull_request:
    branches:
      - main
    paths:
      - "Apps/Find/**"
      - "Apps/StubCustodians/**"
      - "Apps/AuthEmulator/**"
      - "Data/**"
      - .github/workflows/find-e2e-tests.yml

concurrency:
  # Do not allow e2e tests to run concurrently against dev
  # Use a fixed group only when running dev E2E (successful workflow_run on main, or manual dev run);
  # otherwise use a per-run group so ephemeral tests don't block each other.
  group: ${{ ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.manual_run_dev == true)) && 'e2e-test-dev' || format('e2e-test-run-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  # For manual workflow runs (workflow_dispatch) give the user the option of where to run against (ephemeral/dev/both)
  # Otherwise, run against ephemeral for push/PR, and against dev after successful workflow runs on main.
  eval-workflow-setup:
    name: Evaluate run targets
    # Runner labels from RUNNER_LABELS (JSON array). Default: ubuntu-latest.
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - id: eval
        name: Evaluate Workflow Setup
        env:
          RUN_EPHEMERAL: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || inputs.manual_run_ephemeral == true }}
          RUN_DEV: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || inputs.manual_run_dev == true }}
        run: |
          echo
          echo "run_ephemeral=$RUN_EPHEMERAL" >> "$GITHUB_OUTPUT"
          echo "run_dev=$RUN_DEV" >> "$GITHUB_OUTPUT"
          echo "job_start_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

          echo "---- GitHub Context Info: ----"
          echo "github.event_name: ${{ github.event_name || '(no value)' }}"
          echo "github.event.workflow_run.name: ${{ github.event.workflow_run.name || '(no value)' }}"
          echo "github.event.workflow_run.event: ${{ github.event.workflow_run.event || '(no value)' }}"
          echo "github.event.workflow_run.conclusion: ${{ github.event.workflow_run.conclusion || '(no value)' }}"
          echo "github.event.workflow_run.head_branch: ${{ github.event.workflow_run.head_branch || '(no value)' }}"
          echo "github.event.workflow_run.run_started_at: ${{ github.event.workflow_run.run_started_at || '(no value)' }}"
          echo "inputs.environment: ${{ inputs.environment || '(no value)' }}"
          echo "inputs.manual_run_ephemeral: ${{ inputs.manual_run_ephemeral || '(no value)' }}"
          echo "inputs.manual_run_dev: ${{ inputs.manual_run_dev || '(no value)' }}"
          echo
          echo "---- Evaluated Workflow Setup: ----"
          echo "RUN_EPHEMERAL: $RUN_EPHEMERAL"
          echo "RUN_DEV: $RUN_DEV"
    outputs:
      run_ephemeral: ${{ steps.eval.outputs.run_ephemeral }}
      run_dev: ${{ steps.eval.outputs.run_dev }}
      job_start_time: ${{ steps.eval.outputs.job_start_time }}

  e2e-test-ephemeral:
    name: E2E tests (ephemeral)
    needs: eval-workflow-setup
    # Runner labels from RUNNER_LABELS (JSON array). Default: ubuntu-latest.
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    if: needs.eval-workflow-setup.outputs.run_ephemeral == 'true'
    env:
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.EPHEMERAL_E2E_APP_INSIGHTS_CONNECTION_STRING }}
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=ephemeral,service.namespace=MAIS Pilot 3,cloud.region=na"
      AuthClientCredentials__CLIENT_ID_LOCAL_AUTHORITY_01__NewClientId: TestExampleClientId-01
      AuthClientCredentials__CLIENT_ID_LOCAL_AUTHORITY_01__NewClientSecret: TestExampleSecret
      # Point OpenSSL to the .NET dev certs trust directory
      SSL_CERT_DIR: /home/runner/.aspnet/dev-certs/trust:/usr/lib/ssl/certs:/etc/ssl/certs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Generate and Trust .NET Dev Certificate
        run: dotnet dev-certs https --trust

      - name: Setup Node.js (for Azurite and Functions tools)
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install and start Azurite
        run: |
          npm i -g azurite
          azurite \
            --blobHost 127.0.0.1 --blobPort 10000 \
            --queueHost 127.0.0.1 --queuePort 10001 \
            --tableHost 127.0.0.1 --tablePort 10002 \
            --location /tmp/azurite \
            --debug /tmp/azurite/debug.log &
          for port in 10000 10001 10002; do
            for i in {1..20}; do
              (echo > /dev/tcp/127.0.0.1/$port) >/dev/null 2>&1 && break
              sleep 0.5
            done
          done

      - name: Install Azure Functions Core Tools
        run: npm i -g azure-functions-core-tools@4
        
      - name: Create local.settings.json for Find API
        run: |
          cp Apps/Find/src/SUI.Find.FindApi/example.local.settings.json \
             Apps/Find/src/SUI.Find.FindApi/local.settings.json

      - name: Build Find API
        run: dotnet build Apps/Find/src/SUI.Find.FindApi

      - name: Build StubCustodians API
        run: dotnet build Apps/StubCustodians/src/SUI.StubCustodians.API

      - name: Build AuthEmulator API
        run: dotnet build Apps/AuthEmulator/src/SUI.AuthEmulator

      - name: Start StubCustodians API
        run: dotnet run --no-build --launch-profile https &
        working-directory: Apps/StubCustodians/src/SUI.StubCustodians.API

      - name: Start AuthEmulator API
        run: dotnet run --no-build --launch-profile https &
        working-directory: Apps/AuthEmulator/src/SUI.AuthEmulator

      - name: Start Find API
        run: dotnet run --no-build --urls http://localhost:7182 &
        working-directory: Apps/Find/src/SUI.Find.FindApi
        env:
          FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
          AzureWebJobsStorage: UseDevelopmentStorage=true

      - name: Run E2E Tests (against ephemeral environment)
        env:
          E2E__AuthClientIdsJsonMap: '{"CLIENT_ID_LOCAL_AUTHORITY_01": "TestExampleClientId-01"}'
          E2E__AuthClientSecretsJsonMap: '{"CLIENT_ID_LOCAL_AUTHORITY_01": "TestExampleSecret"}'
        run: |
          dotnet test Apps/Find/tests/SUI.Find.E2ETests/SUI.Find.E2ETests.csproj \
            --filter "Category=E2E&Suite=Standard" \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=e2e-ephemeral.trx" \
            --results-directory TestResults \
            -e E2E__SkipResetAzureTables=False \
            -e E2E__CheckStubCustodiansApiBuildTimestampThreshold=${{ needs.eval-workflow-setup.outputs.job_start_time }} \
            -e E2E__CheckAuthEmulatorApiBuildTimestampThreshold=${{ needs.eval-workflow-setup.outputs.job_start_time }} \
            -e E2E__CheckFindApiBuildTimestampThreshold=${{ needs.eval-workflow-setup.outputs.job_start_time }} # The threshold checks are not necessary for ephemeral e2e tests, but are included to verify the threshold behaviour at pull request stage

      - name: Publish E2E test summary (ephemeral)
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v3
        with:
          name: Find E2E (ephemeral)
          path: TestResults/e2e-ephemeral.trx
          reporter: dotnet-trx
          fail-on-error: false

  e2e-test-dev:
    name: E2E tests (dev ${{ inputs.environment || 'd01' }})
    needs: eval-workflow-setup
    # Runner labels from RUNNER_LABELS (JSON array). Default: ubuntu-latest.
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    if: needs.eval-workflow-setup.outputs.run_dev == 'true'
    environment:
      name: ${{ inputs.environment || 'd01' }}
      deployment: false
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment || 'd01' }}
      FIND_API_GATEWAY_BASE_URL: ${{ secrets.FIND_API_GATEWAY_BASE_URL || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Load tfvars for ${{ env.TARGET_ENVIRONMENT }}
        id: env_config
        uses: ./.github/actions/load-tfvars
        with:
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          
      - name: Azure login with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Secret from Key Vault
        uses: azure/get-keyvault-secrets@v1
        id: kv_secrets
        with:
          keyvault: "${{ steps.env_config.outputs.subscription_prefix }}${{ steps.env_config.outputs.environment_id }}kv-${{ steps.env_config.outputs.region_short }}-findkv01"
          secrets: 'find-match-api-key'

      - name: Run E2E Tests (against dev environment)
        if: ${{ (env.FIND_API_GATEWAY_BASE_URL || '') == '' }}
        env:
          E2E__AuthClientIdsJsonMap: ${{ secrets.AUTH_CLIENT_IDS_JSON_MAP }}
          E2E__AuthClientSecretsJsonMap: ${{ secrets.AUTH_CLIENT_SECRETS_JSON_MAP }}
          E2E__FindApiKey: ${{ steps.kv_secrets.outputs.find-match-api-key }}
        run: |
          dotnet test Apps/Find/tests/SUI.Find.E2ETests/SUI.Find.E2ETests.csproj \
            --filter "Category=E2E&Suite=Standard" \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=e2e-dev.trx" \
            --results-directory TestResults \
            -e E2E__BaseUrl=https://${{ steps.env_config.outputs.subscription_prefix }}${{ steps.env_config.outputs.environment_id }}func-${{ steps.env_config.outputs.region_short }}-find01.azurewebsites.net/api/ \
            -e E2E__StubCustodiansBaseUrl=https://${{ steps.env_config.outputs.subscription_prefix }}${{ steps.env_config.outputs.environment_id }}app-${{ steps.env_config.outputs.region_short }}-custodians01.azurewebsites.net/api/ \
            -e E2E__AccessTokenUrl=${{ secrets.AUTH_SETTINGS__ACCESS_TOKEN_URL }} \
            -e E2E__AuthEmulatorHealthCheckEndpoint="https://${{ steps.env_config.outputs.subscription_prefix }}${{ steps.env_config.outputs.environment_id }}app-${{ steps.env_config.outputs.region_short }}-authemulator01.azurewebsites.net/api/health" \
            -e E2E__SkipResetAzureTables=True \
            -e E2E__CheckStubCustodiansApiBuildTimestampThreshold=${{ contains(github.event.workflow_run.name, 'Build, Test, Deploy: "Custodians" Solution') && github.event.workflow_run.run_started_at || '' }} \
            -e E2E__CheckAuthEmulatorApiBuildTimestampThreshold=${{ contains(github.event.workflow_run.name, 'Build, Test, Deploy: "Auth Emulator" Solution') && github.event.workflow_run.run_started_at || '' }} \
            -e E2E__CheckFindApiBuildTimestampThreshold=${{ contains(github.event.workflow_run.name, 'Build, Test, Deploy: "Find" Solution') && github.event.workflow_run.run_started_at || '' }} # We pass the run_started_at value(s) so that we ensure the relevant API has restarted with the latest version. Note that this will pass an empty value if this pipeline was not trigerred by a workflow_run for that specific API, but that is fine and desired in that case (because we only need the check when this pipeline is immediately trigerred by the workflow_run after deployment of that specific API)

      - name: Run E2E Tests (against dev environment via gateway)
        if: ${{ (env.FIND_API_GATEWAY_BASE_URL || '') != '' }}
        env:
          E2E__AuthClientIdsJsonMap: ${{ secrets.AUTH_CLIENT_IDS_JSON_MAP }}
          E2E__AuthClientSecretsJsonMap: ${{ secrets.AUTH_CLIENT_SECRETS_JSON_MAP }}
          E2E__FindApiKey: ${{ steps.kv_secrets.outputs.find-match-api-key }}
        run: |
          dotnet test Apps/Find/tests/SUI.Find.E2ETests/SUI.Find.E2ETests.csproj \
            --filter "Category=E2E&Suite=Standard&RequiresAuthEmulator!=true" \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=e2e-dev.trx" \
            --results-directory TestResults \
            -e E2E__BaseUrl=${{ env.FIND_API_GATEWAY_BASE_URL }} \
            -e E2E__StubCustodiansBaseUrl=https://${{ steps.env_config.outputs.subscription_prefix }}${{ steps.env_config.outputs.environment_id }}app-${{ steps.env_config.outputs.region_short }}-custodians01.azurewebsites.net/api/ \
            -e E2E__AccessTokenUrl=${{ secrets.AUTH_SETTINGS__ACCESS_TOKEN_URL }} \
            -e E2E__AuthEmulatorHealthCheckEndpoint="" \
            -e E2E__SkipResetAzureTables=True \
            -e E2E__AuthScope=${{ secrets.FIND_API_GATEWAY_AUTH_SCOPE }} \
            -e E2E__CheckStubCustodiansApiBuildTimestampThreshold=${{ contains(github.event.workflow_run.name, 'Build, Test, Deploy: "Custodians" Solution') && github.event.workflow_run.run_started_at || '' }} \
            -e E2E__CheckAuthEmulatorApiBuildTimestampThreshold="" \
            -e E2E__CheckFindApiBuildTimestampThreshold=${{ contains(github.event.workflow_run.name, 'Build, Test, Deploy: "Find" Solution') && github.event.workflow_run.run_started_at || '' }} # We pass the run_started_at value(s) so that we ensure the relevant API has restarted with the latest version. Note that this will pass an empty value if this pipeline was not trigerred by a workflow_run for that specific API, but that is fine and desired in that case (because we only need the check when this pipeline is immediately trigerred by the workflow_run after deployment of that specific API)

      - name: Publish E2E test summary (dev)
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v3
        with:
          name: Find E2E (dev)
          path: TestResults/e2e-dev.trx
          reporter: dotnet-trx
          fail-on-error: false
