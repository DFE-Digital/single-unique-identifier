name: Build, Test and Generate OpenAPI for StubCustodians

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Apps/StubCustodians/**"
  pull_request:
    branches:
      - main
    paths:
      - "Apps/StubCustodians/**"

jobs:
  build-and-test-StubCustodians:
    name: StubCustodians - Build Test Dotnet
    uses: ./.github/workflows/build-test-dotnet.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      checks: write
      packages: read
    with:
      directory_name: Apps/StubCustodians

  generate-openapi:
    name: StubCustodians - Generate OpenAPI Spec
    runs-on: ubuntu-latest
    needs: build-and-test-StubCustodians

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      # Build the API project to produce the DLL
      - name: Build API Project
        run: |
          dotnet build Apps/StubCustodians/src/SUI.StubCustodians.API/SUI.StubCustodians.API.csproj --configuration Release

      # Install Swashbuckle CLI globally
      - name: Install Swashbuckle CLI
        run: |
          dotnet tool install --global Swashbuckle.AspNetCore.Cli --version 9.0.6
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # Verify the tool is installed
      - name: Check swagger CLI installation
        run: |
          which swagger || echo "swagger not found"
          ls $HOME/.dotnet/tools

      # Generate OpenAPI Spec
      - name: Generate OpenAPI JSON
        run: |
          swagger tofile \
            --output custodians-openapi.json \
            Apps/StubCustodians/src/SUI.StubCustodians.API/bin/Release/net9.0/SUI.StubCustodians.API.dll \
            v1

      # Upload OpenAPI Spec
      - name: Upload Generated OpenAPI Spec
        uses: actions/upload-artifact@v4
        with:
          name: stub-custodians-openapi
          path: custodians-openapi.json