name: Rotate Key Vault Secret
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
    && format(
      'Rotate Key Vault Secret - {0} in {1} ({2})',
      inputs.secret_name,
      inputs.environment,
      inputs.apply && 'apply' || 'plan'
    )
    || 'Rotate Key Vault Secret - scheduled run'
  }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: d01
        type: choice
        options:
          - d01
          - d02
      secret_name:
        description: Supported secret name to rotate
        required: true
        default: find-match-api-key
        type: string
      reason:
        description: Why this rotation is being triggered
        required: true
        default: planned_rotation
        type: choice
        options:
          - planned_rotation
          - suspected_exposure
          - exposed_secret
      apply:
        description: Apply the rotation (otherwise plan only)
        required: true
        default: false
        type: boolean
      verify:
        description: Run post-rotation smoke tests after apply
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "0 3 * * 1"

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    name: Resolve run targets
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_targets: ${{ steps.matrix.outputs.has_targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build run matrix
        id: matrix
        env:
          TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || '' }}
          TARGET_SECRET_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.secret_name || '' }}
        shell: pwsh
        run: ./.github/scripts/rotate-keyvault-secret.ps1 -Command matrix

  rotate:
    needs: prepare
    if: needs.prepare.outputs.has_targets == 'true'
    name: Rotate Key Vault Secret - ${{ matrix.secret_name }} in ${{ matrix.environment }}
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    environment: ${{ matrix.environment }}
    concurrency:
      group: rotate-keyvault-secret-${{ matrix.secret_name }}-${{ matrix.environment }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      TARGET_ENVIRONMENT: ${{ matrix.environment }}
      TARGET_SECRET_NAME: ${{ matrix.secret_name }}
      ROTATION_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.reason || 'scheduled_rotation' }}
      APPLY_ROTATION: ${{ github.event_name == 'workflow_dispatch' && (inputs.apply && 'true' || 'false') || 'true' }}
      VERIFY_AFTER_APPLY: ${{ github.event_name == 'workflow_dispatch' && (inputs.verify && 'true' || 'false') || 'true' }}
      ROTATION_WINDOW_DAYS: "30"
      PLAN_FILE: tfplan
      ARM_USE_OIDC: true
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # The NHS secrets below are only required for the Match Function, and are transmitted from Github Secrets to the Azure Key Vault.
      TF_VAR_nhs_digital_client_id: ${{ secrets.NHS_DIGITAL_CLIENT_ID}}
      TF_VAR_nhs_digital_kid: ${{ secrets.NHS_DIGITAL_KID}}
      TF_VAR_nhs_digital_private_key: ${{ secrets.NHS_DIGITAL_PRIVATE_KEY}}
      # The secret below is only required for the UI Harness, and are transmitted from Github Secrets to the Azure Key Vault.
      TF_VAR_ui_test_harness_password: ${{ secrets.UI_TEST_HARNESS_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js for Terraform
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v4

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Azure login with OIDC for ${{ env.TARGET_ENVIRONMENT }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Load tfvars for ${{ env.TARGET_ENVIRONMENT }}
        id: env_config
        uses: ./.github/actions/load-tfvars
        with:
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - name: Compute rotation context for ${{ env.TARGET_SECRET_NAME }}
        id: context
        env:
          SUBSCRIPTION_PREFIX: ${{ steps.env_config.outputs.subscription_prefix }}
          ENVIRONMENT_ID: ${{ steps.env_config.outputs.environment_id }}
          REGION_SHORT: ${{ steps.env_config.outputs.region_short }}
          DESCRIPTOR: ${{ steps.env_config.outputs.descriptor }}
        shell: pwsh
        run: ./.github/scripts/rotate-keyvault-secret.ps1 -Command context

      - name: Inspect current secret metadata for ${{ env.TARGET_SECRET_NAME }}
        id: secret_state
        env:
          KEY_VAULT_NAME: ${{ steps.context.outputs.key_vault_name }}
          SECRET_NAME: ${{ steps.context.outputs.secret_name }}
          SCHEDULED_ENABLED: ${{ steps.context.outputs.scheduled_enabled }}
        shell: pwsh
        run: ./.github/scripts/rotate-keyvault-secret.ps1 -Command inspect

      - name: Terraform init backend (${{ steps.env_config.outputs.state_rg }})
        if: steps.secret_state.outputs.should_rotate == 'true'
        run: |
          terraform -chdir="${{ steps.context.outputs.tf_root }}" init \
            -backend-config="resource_group_name=${{ steps.env_config.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.env_config.outputs.state_storage }}" \
            -backend-config="container_name=${{ steps.env_config.outputs.state_container }}" \
            -backend-config="key=${{ steps.context.outputs.state_key }}"

      - name: Terraform validate ${{ steps.context.outputs.tf_root }}
        if: steps.secret_state.outputs.should_rotate == 'true'
        run: terraform -chdir="${{ steps.context.outputs.tf_root }}" validate

      - name: Plan secret rotation for ${{ env.TARGET_SECRET_NAME }}
        if: steps.secret_state.outputs.should_rotate == 'true'
        env:
          TF_ROOT: ${{ steps.context.outputs.tf_root }}
          TFVARS_PATH: ${{ steps.env_config.outputs.tfvars_path }}
          ROTATE_TARGETS: ${{ steps.context.outputs.rotate_targets }}
          REPLACE_TARGETS: ${{ steps.context.outputs.replace_targets }}
        shell: pwsh
        run: ./.github/scripts/rotate-keyvault-secret.ps1 -Command plan

      - name: Apply secret rotation for ${{ env.TARGET_SECRET_NAME }}
        if: steps.secret_state.outputs.should_rotate == 'true' && env.APPLY_ROTATION == 'true'
        run: terraform -chdir="${{ steps.context.outputs.tf_root }}" apply -input=false "$PLAN_FILE"

      - name: Refresh dependent configuration for ${{ env.TARGET_SECRET_NAME }}
        if: steps.secret_state.outputs.should_rotate == 'true' && env.APPLY_ROTATION == 'true'
        env:
          REFRESH_MODE: ${{ steps.context.outputs.refresh_mode }}
          RESTART_MODE: ${{ steps.context.outputs.restart_mode }}
          RESOURCE_GROUP_NAME: ${{ steps.context.outputs.resource_group_name }}
          FUNCTION_APP_NAME: ${{ steps.context.outputs.function_app_name }}
        shell: pwsh
        run: ./.github/scripts/rotate-keyvault-secret.ps1 -Command apply-config

      - name: Inspect rotated secret metadata for ${{ env.TARGET_SECRET_NAME }}
        if: steps.secret_state.outputs.should_rotate == 'true' && env.APPLY_ROTATION == 'true'
        id: rotated_secret_state
        env:
          KEY_VAULT_NAME: ${{ steps.context.outputs.key_vault_name }}
          SECRET_NAME: ${{ steps.context.outputs.secret_name }}
          SCHEDULED_ENABLED: ${{ steps.context.outputs.scheduled_enabled }}
        shell: pwsh
        run: ./.github/scripts/rotate-keyvault-secret.ps1 -Command inspect

      - name: Set up .NET for smoke tests
        if: steps.secret_state.outputs.should_rotate == 'true' && env.APPLY_ROTATION == 'true' && env.VERIFY_AFTER_APPLY == 'true' && steps.context.outputs.verification_runner == 'dotnet_test'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Verify rotated secret for ${{ env.TARGET_SECRET_NAME }}
        if: steps.secret_state.outputs.should_rotate == 'true' && env.APPLY_ROTATION == 'true' && env.VERIFY_AFTER_APPLY == 'true'
        env:
          VERIFICATION_RUNNER: ${{ steps.context.outputs.verification_runner }}
          VERIFICATION_PROJECT: ${{ steps.context.outputs.verification_project }}
          VERIFICATION_FILTER: ${{ steps.context.outputs.verification_filter }}
          VERIFICATION_SECRET_ENV_NAME: ${{ steps.context.outputs.verification_secret_env_name }}
          VERIFICATION_PREVIOUS_SECRET_ENV_NAME: ${{ steps.context.outputs.verification_previous_secret_env_name }}
          KEY_VAULT_NAME: ${{ steps.context.outputs.key_vault_name }}
          SECRET_NAME: ${{ steps.context.outputs.secret_name }}
          PREVIOUS_SECRET_VERSION: ${{ steps.secret_state.outputs.version }}
          E2E__BaseUrl: ${{ steps.context.outputs.base_url }}
          E2E__SkipResetAzureTables: "True"
        run: |
          if [ -n "$VERIFICATION_SECRET_ENV_NAME" ]; then
            secret_value=$(az keyvault secret show \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$SECRET_NAME" \
              --query value \
              -o tsv)

            echo "::add-mask::$secret_value"
            export "$VERIFICATION_SECRET_ENV_NAME=$secret_value"
          fi

          if [ -n "$VERIFICATION_PREVIOUS_SECRET_ENV_NAME" ] && [ -n "$PREVIOUS_SECRET_VERSION" ]; then
            previous_secret_value=$(az keyvault secret show \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$SECRET_NAME" \
              --version "$PREVIOUS_SECRET_VERSION" \
              --query value \
              -o tsv)

            echo "::add-mask::$previous_secret_value"
            export "$VERIFICATION_PREVIOUS_SECRET_ENV_NAME=$previous_secret_value"
          fi

          case "$VERIFICATION_RUNNER" in
            dotnet_test)
              dotnet test "$VERIFICATION_PROJECT" \
                --filter "$VERIFICATION_FILTER" \
                --logger "console;verbosity=detailed"
              ;;
            "")
              echo "No post-rotation verification configured for $TARGET_SECRET_NAME."
              ;;
            *)
              echo "Unsupported verification runner: $VERIFICATION_RUNNER"
              exit 1
              ;;
          esac

      - name: Write rotation summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          SECRET_DISPLAY_NAME: ${{ steps.context.outputs.secret_display_name }}
          CURRENT_VERSION_BEFORE: ${{ steps.secret_state.outputs.version }}
          CURRENT_EXPIRY_BEFORE: ${{ steps.secret_state.outputs.expires }}
          DAYS_REMAINING_BEFORE: ${{ steps.secret_state.outputs.days_remaining }}
          SHOULD_ROTATE: ${{ steps.secret_state.outputs.should_rotate }}
          FUNCTION_APP_NAME: ${{ steps.context.outputs.function_app_name }}
          CURRENT_VERSION_AFTER: ${{ steps.rotated_secret_state.outputs.version }}
          CURRENT_EXPIRY_AFTER: ${{ steps.rotated_secret_state.outputs.expires }}
        shell: pwsh
        run: ./.github/scripts/rotate-keyvault-secret.ps1 -Command summary
