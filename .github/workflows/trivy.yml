name: Trivy Repository Scan

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-scan:
    name: Trivy repository scan
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy repository scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: false
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: 0
          vuln-type: os,library
          scanners: vuln,misconfig,license

      - name: Publish Trivy output to summary
        shell: bash
        run: |
          if [[ -s trivy-results.txt ]]; then
            {
              echo "### Trivy Repository Results"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```text'
              cat trivy-results.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
