name: Build and Test Dotnet Project

on:
  workflow_call:
    inputs:
      directory_name:
        type: string
        required: true
      project_names:
        description: JSON array of project names (e.g. ["SUI.Find.FindApi","SUI.Find.AuditProcessor"])
        type: string
        required: true
    outputs:
      artifact_names:
        description: JSON map of project -> artifact name
        value: ${{ jobs.build-test-dotnet.outputs.artifact_names }}

permissions:
  contents: read
  pull-requests: write
  checks: write
  packages: read
  actions: write

jobs:
  build-test-dotnet:
    runs-on: ubuntu-latest
    env:
      PROJECTS_JSON: ${{ inputs.project_names }}
    outputs:
      artifact_names: ${{ steps.publish.outputs.map }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: 21

      - name: Install .Net Tools
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet tool install --global dotnet-reportgenerator-globaltool
          dotnet tool install --global dotnet-sonarscanner

      - name: Set up NuGet authentication
        run: |
          echo "Writing NuGet Auth config..."
          dotnet nuget update source DFEDigital --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Start SonarCloud Scanner
        run: |
          dotnet-sonarscanner begin \
            /k:"DFE-Digital_single-unique-identifier" \
            /o:"dfe-digital" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.coverageReportPaths=./${{ inputs.directory_name }}/CoverageReport/SonarQube.xml \
            /d:sonar.coverage.exclusions="**/Program.cs,**/*.json" \
            /d:sonar.exclusions="**/wwwroot/**,**/*Hardcoded*,**/SUI.Find.CustodianSimulation/**" \
            /d:sonar.cpd.exclusions="**/Program.cs" \
            /d:sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S6602 \
            /d:sonar.scanner.skipJreProvisioning=true \
            /d:sonar.scanner.scanAll=false
        env:
          NuGetPackageSourceCredentials_DFEDigital: Username=${{ github.actor }};Password=${{ secrets.GITHUB_TOKEN }}

      - name: Build project
        run: dotnet build ./${{ inputs.directory_name }} --no-incremental

      - name: Run tests
        run: dotnet test ./${{ inputs.directory_name }} --no-build --verbosity normal --settings ${{ inputs.directory_name }}/tests.runsettings --filter "Category!=E2E"

      - name: Generate coverage report
        run: |
          reportgenerator -reports:./${{ inputs.directory_name }}/**/coverage.cobertura.xml -targetdir:${{ inputs.directory_name }}/CoverageReport -reporttypes:SonarQube,html
          dotnet coverage merge --reports "${{ inputs.directory_name }}/**/coverage.cobertura.xml" -f cobertura -o ${{ inputs.directory_name }}/coverage/coverage.xml

      - name: End SonarCloud Scanner
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        env:
          NuGetPackageSourceCredentials_DFEDigital: Username=${{ github.actor }};Password=${{ secrets.GITHUB_TOKEN }}

      - name: Publish projects
        id: publish
        run: |
          app="${{ inputs.directory_name }}"
          app="${app##*/}"
          sha="${GITHUB_SHA::7}"
          date=$(date +%Y%m%d)
          map='{}'
          for proj in $(echo "$PROJECTS_JSON" | jq -r '.[]'); do
            out="publish/$proj"
            mkdir -p "$out"
            dotnet publish "${{ inputs.directory_name }}/src/$proj/$proj.csproj" -c Release -o "$out"
            name="${app}-${proj}-${date}-${sha}-build"
            map=$(echo "$map" | jq --arg k "$proj" --arg v "$name" '. + {($k):$v}')
          done
          echo "map=$(echo "$map" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "include=$(echo "$include" | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Upload combined artifact
        uses: actions/upload-artifact@v6
        with:
          name: publish-all
          path: publish
          include-hidden-files: true

      - name: Publish coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: github.event_name == 'pull_request'
        with:
          filename: ${{ inputs.directory_name }}/coverage/coverage.xml
          badge: true
          format: markdown
          hide_complexity: true
          output: both

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  upload-artifacts:
    runs-on: ubuntu-latest
    needs: build-test-dotnet
    strategy:
      matrix:
        project: ${{ fromJson(inputs.project_names) }}
    steps:
      - name: Download combined artifact
        uses: actions/download-artifact@v7
        with:
          name: publish-all
          path: .

      - name: Upload per-project artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ fromJson(needs.build-test-dotnet.outputs.artifact_names)[matrix.project] }}
          path: ${{ matrix.project }}
          include-hidden-files: true
