name: Build and Test Dotnet Project

on:
  workflow_call:
    inputs:
      directory_name:
        type: string
        required: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  packages: read

jobs:
  build-test-dotnet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: "microsoft"
          java-version: 21

      - name: Install .Net Tools
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet tool install --global dotnet-reportgenerator-globaltool
          dotnet tool install --global dotnet-sonarscanner
          
      - name: Set up NuGet authentication
        run: |
          echo "Writing NuGet Auth config..."
          dotnet nuget add source "https://nuget.pkg.github.com/DFE-Digital/index.json" --name DFEDigital --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text
      
      - name: Start SonarCloud Scanner
        run: |
          dotnet-sonarscanner begin \
            /k:"DFE-Digital_single-unique-identifier" \
            /o:"dfe-digital" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.coverageReportPaths=./${{ inputs.directory_name }}/CoverageReport/SonarQube.xml \
            /d:sonar.coverage.exclusions="**/Program.cs,**/*.json" \
            /d:sonar.cpd.exclusions="**/Program.cs" \
            /d:sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S6602 \
            /d:sonar.scanner.skipJreProvisioning=true \
            /d:sonar.scanner.scanAll=false
          dotnet build ./${{ inputs.directory_name }} --no-incremental
          dotnet test ./${{ inputs.directory_name }} --no-build --verbosity normal --settings ${{ inputs.directory_name}}/tests.runsettings
          reportgenerator -reports:./${{ inputs.directory_name }}/**/coverage.cobertura.xml -targetdir:${{ inputs.directory_name }}/CoverageReport -reporttypes:SonarQube,html
          dotnet coverage merge --reports "${{ inputs.directory_name }}/**/coverage.cobertura.xml" -f cobertura -o ${{ inputs.directory_name}}/coverage/coverage.xml
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        env:
          NuGetPackageSourceCredentials_DFEDigital: Username=${{ github.actor }};Password=${{ secrets.GITHUB_TOKEN }}

      - name: Publish coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: github.event_name == 'pull_request'
        with:
          filename: ${{ inputs.directory_name }}/coverage/coverage.xml
          badge: true
          format: markdown
          hide_complexity: true
          output: both

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md