name: Terraform Plan and Apply

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      apply:
        required: false
        default: false
        type: boolean
      root:
        description: Path to Terraform root (relative to repo)
        required: true
        type: string
      state_key:
        description: Optional override for backend state key
        required: false
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      # The NHS secrets below are only required for the Match Function.
      NHS_DIGITAL_CLIENT_ID:
        required: true
      NHS_DIGITAL_KID:
        required: true
      NHS_DIGITAL_PRIVATE_KEY:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.root }} for ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})
    # Runner labels from RUNNER_LABELS (JSON array). Default: ubuntu-latest.
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    environment: ${{ inputs.environment }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      ARM_USE_OIDC: true
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_prefix: ${{ vars.AZURE_SUBSCRIPTION_PREFIX }}
      TF_VAR_region_short: ${{ vars.AZURE_REGION_SHORT }}
      TF_VAR_descriptor: ${{ vars.AZURE_ENV_DESCRIPTOR }}
      # The NHS secrets below are only required for the Match Function, and are transmitted from Github Secrets to the Azure Key Vault.
      TF_VAR_nhs_digital_client_id: ${{ secrets.NHS_DIGITAL_CLIENT_ID }}
      TF_VAR_nhs_digital_kid: ${{ secrets.NHS_DIGITAL_KID }}
      TF_VAR_nhs_digital_private_key: ${{ secrets.NHS_DIGITAL_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js (for Terraform)
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v4

      - name: Install Azure CLI
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Azure login with OIDC for ${{ inputs.environment }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Load tfvars for ${{ env.TARGET_ENVIRONMENT }}
        id: env_config
        uses: ./.github/actions/load-tfvars
        with:
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - name: Terraform init backend (${{ steps.env_config.outputs.state_rg }})
        env:
          STATE_KEY: ${{ inputs.state_key || steps.env_config.outputs.state_key }}
        run: |
          terraform -chdir=${{ inputs.root }} init \
            -backend-config="resource_group_name=${{ steps.env_config.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.env_config.outputs.state_storage }}" \
            -backend-config="container_name=${{ steps.env_config.outputs.state_container }}" \
            -backend-config="key=$STATE_KEY"

      - name: Terraform validate ${{ inputs.root }}
        run: terraform -chdir=${{ inputs.root }} validate

      - name: "Terraform plan ${{ inputs.root }} (tfvars: ${{ steps.env_config.outputs.tfvars_path }})"
        run: terraform -chdir=${{ inputs.root }} plan -input=false -var-file=../${{ steps.env_config.outputs.tfvars_path }} -out=tfplan

      - name: Summarize tfplan
        if: always()
        env:
          TF_ROOT: ${{ inputs.root }}
        run: |
          cd "$TF_ROOT"
          summary_header="## Plan summary"
          plan_file="tfplan"

          if [ ! -f "$plan_file" ]; then
            {
              echo "$summary_header"
              echo ""
              echo "No plan file found (expected $plan_file). The plan step may have failed."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          tmp=$(mktemp)
          if terraform show -json "$plan_file" > "$tmp"; then
            adds=$(jq '[.resource_changes[] | select(.change.actions | index("create"))] | length' "$tmp")
            changes=$(jq '[.resource_changes[] | select(.change.actions | index("update"))] | length' "$tmp")
            destroys=$(jq '[.resource_changes[] | select(.change.actions | index("delete"))] | length' "$tmp")
            details=$(jq -r '
              .resource_changes[]
              | {addr: .address, acts: (.change.actions | join("/"))}
              | "- \(.acts): `\(.addr)`"
            ' "$tmp")

            {
              echo "$summary_header"
              echo ""
              echo "- Adds: \`$adds\`"
              echo "- Changes: \`$changes\`"
              echo "- Destroys: \`$destroys\`"
              if [ -n "$details" ]; then
                echo ""
                echo "### Resources"
                echo "$details"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "$summary_header"
              echo ""
              echo "Failed to parse plan file with \`terraform show -json\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Terraform apply ${{ inputs.root }} (tfplan)
        if: inputs.apply == true
        run: terraform -chdir=${{ inputs.root }} apply -input=false tfplan

      - name: Write workflow summary
        if: always()
        env:
          INPUT_ENV: ${{ inputs.environment }}
          APPLY_FLAG: ${{ inputs.apply }}
          ROOT: ${{ inputs.root }}
          TFVARS_PATH: ${{ steps.env_config.outputs.tfvars_path }}
          STATE_RG: ${{ steps.env_config.outputs.state_rg }}
          STATE_STORAGE: ${{ steps.env_config.outputs.state_storage }}
          STATE_CONTAINER: ${{ steps.env_config.outputs.state_container }}
          STATE_KEY: ${{ inputs.state_key || steps.env_config.outputs.state_key }}
          JOB_STATUS: ${{ job.status }}
        run: |
          mode=$([ "$APPLY_FLAG" = "true" ] && echo "apply" || echo "plan")
          status_icon=$([ "$JOB_STATUS" = "success" ] && echo "✅" || echo "❌")
          tfvars="${TFVARS_PATH:-unknown}"
          state_rg="${STATE_RG:-unknown}"
          state_storage="${STATE_STORAGE:-unknown}"
          state_container="${STATE_CONTAINER:-unknown}"
          state_key="${STATE_KEY:-unknown}"

          {
            echo "## $status_icon Terraform $mode"
            echo ""
            echo "- **Environment:** \`$INPUT_ENV\`"
            echo "- **Mode:** \`$mode\`"
            echo "- **Root:** \`$ROOT\`"
            echo "- **tfvars:** \`$tfvars\`"
            echo "- **State:** \`$state_rg / $state_storage / $state_container / $state_key\`"
            echo "- **Job status:** $status_icon \`$JOB_STATUS\`"
            echo ""
            echo "> ℹ️ If any values show as \`unknown\`, check tfvars loading and backend configuration."
          } >> "$GITHUB_STEP_SUMMARY"
