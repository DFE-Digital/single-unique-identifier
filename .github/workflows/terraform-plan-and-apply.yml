name: Terraform Plan and Apply

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      apply:
        required: false
        default: false
        type: boolean
      root:
        description: Path to Terraform root (relative to repo)
        required: true
        type: string
      state_key:
        description: Optional override for backend state key
        required: false
        type: string
    secrets:
      AZURE_CLIENT_CREDENTIALS_SECRET_DEV_S270D:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.root }} for ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})
    runs-on: ubuntu-latest
    environment: ${{ startsWith(inputs.environment, 't') && 'test' || 'dev' }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@v3

      - name: Azure login with client secret for ${{ inputs.environment }}
        uses: azure/login@v2
        with:
          # To use OIDC, remove `creds` and uncomment these lines.
          # client-id: ${{ secrets.AZURE_CLIENT_ID }}
          # tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          creds: |
            {
              "clientSecret": "${{ secrets.AZURE_CLIENT_CREDENTIALS_SECRET_DEV_S270D }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}"
            }

      - name: Load tfvars for ${{ env.TARGET_ENVIRONMENT }}
        id: env_config
        uses: ./.github/actions/load-tfvars
        with:
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - name: Terraform init backend (${{ steps.env_config.outputs.state_rg }})
        env:
          STATE_KEY: ${{ inputs.state_key || steps.env_config.outputs.state_key }}
        run: |
          terraform -chdir=${{ inputs.root }} init \
            -backend-config="resource_group_name=${{ steps.env_config.outputs.state_rg }}" \
            -backend-config="storage_account_name=${{ steps.env_config.outputs.state_storage }}" \
            -backend-config="container_name=${{ steps.env_config.outputs.state_container }}" \
            -backend-config="key=$STATE_KEY"

      - name: Terraform validate ${{ inputs.root }}
        run: terraform -chdir=${{ inputs.root }} validate

      - name: "Terraform plan ${{ inputs.root }} (tfvars: ${{ steps.env_config.outputs.tfvars_path }})"
        run: terraform -chdir=${{ inputs.root }} plan -input=false -var-file=../${{ steps.env_config.outputs.tfvars_path }} -out=tfplan

      - name: Terraform apply ${{ inputs.root }} (tfplan)
        if: inputs.apply == true
        run: terraform -chdir=${{ inputs.root }} apply -input=false tfplan

      - name: Write workflow summary
        if: always()
        env:
          INPUT_ENV: ${{ inputs.environment }}
          APPLY_FLAG: ${{ inputs.apply }}
          ROOT: ${{ inputs.root }}
          TFVARS_PATH: ${{ steps.env_config.outputs.tfvars_path }}
          STATE_RG: ${{ steps.env_config.outputs.state_rg }}
          STATE_STORAGE: ${{ steps.env_config.outputs.state_storage }}
          STATE_CONTAINER: ${{ steps.env_config.outputs.state_container }}
          STATE_KEY: ${{ inputs.state_key || steps.env_config.outputs.state_key }}
          JOB_STATUS: ${{ job.status }}
        run: |
          mode=$([ "$APPLY_FLAG" = "true" ] && echo "apply" || echo "plan")
          status_icon=$([ "$JOB_STATUS" = "success" ] && echo "✅" || echo "❌")
          tfvars="${TFVARS_PATH:-unknown}"
          state_rg="${STATE_RG:-unknown}"
          state_storage="${STATE_STORAGE:-unknown}"
          state_container="${STATE_CONTAINER:-unknown}"
          state_key="${STATE_KEY:-unknown}"

          {
            echo "## $status_icon Terraform $mode"
            echo ""
            echo "- **Environment:** \`$INPUT_ENV\`"
            echo "- **Mode:** \`$mode\`"
            echo "- **Root:** \`$ROOT\`"
            echo "- **tfvars:** \`$tfvars\`"
            echo "- **State:** \`$state_rg / $state_storage / $state_container / $state_key\`"
            echo "- **Job status:** $status_icon \`$JOB_STATUS\`"
            echo ""
            echo "> ℹ️ If any values show as \`unknown\`, check tfvars loading and backend configuration."
          } >> "$GITHUB_STEP_SUMMARY"
