name: Restart Azure Web App
run-name: >-
  ${{
    format(
      'Restart Azure Web App - {0} in {1}',
      inputs.web_app_descriptor,
      inputs.environment
    )
  }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: d01
        type: choice
        options:
          - d01
          - d02
      web_app_descriptor:
        description: Web App to restart
        required: true
        default: custodians01
        type: choice
        options:
          - custodians01
          - uiharness01

  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      web_app_descriptor:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write

jobs:
  restart-web-app:
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS || '["ubuntu-latest"]') }}
    environment: ${{ inputs.environment }}
    env:
      RESOURCE_GROUP_NAME: ${{ format('{0}{1}rg-{2}-{3}', vars.AZURE_SUBSCRIPTION_PREFIX, inputs.environment, vars.AZURE_REGION_SHORT, vars.AZURE_ENV_DESCRIPTOR) }}
      WEB_APP_NAME: ${{ format('{0}{1}app-{2}-{3}', vars.AZURE_SUBSCRIPTION_PREFIX, inputs.environment, vars.AZURE_REGION_SHORT, inputs.web_app_descriptor) }}
    steps:
      - name: Display Workflow Setup
        run: |
          echo
          echo "---- Workflow Setup: ----"
          echo "RESOURCE_GROUP_NAME: $RESOURCE_GROUP_NAME"
          echo "WEB_APP_NAME: $WEB_APP_NAME"

      - name: Azure login with OIDC for ${{ inputs.environment }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restart Azure Web App
        run: |
          az webapp restart \
            --name $WEB_APP_NAME \
            --resource-group $RESOURCE_GROUP_NAME
