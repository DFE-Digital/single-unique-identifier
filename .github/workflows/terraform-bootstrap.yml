name: Terraform Backend Bootstrap
run-name: Terraform Backend Bootstrap - ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to bootstrap (matches tfvars name)
        required: true
        default: d01
        type: choice
        options:
          - d01

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: Bootstrap backend for ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ startsWith(inputs.environment, 't') && 'test' || 'dev' }}
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_CREDENTIALS_SECRET_DEV_S270D }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with client secret for ${{ inputs.environment }}
        uses: azure/login@v2
        with:
          # To use OIDC, remove `creds` and uncomment these lines.
          # client-id: ${{ secrets.AZURE_CLIENT_ID }}
          # tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          creds: |
            {
              "clientSecret": "${{ secrets.AZURE_CLIENT_CREDENTIALS_SECRET_DEV_S270D }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}"
            }
          enable-AzPSSession: true

      - name: Load tfvars for ${{ env.TARGET_ENVIRONMENT }}
        id: env_config
        uses: ./.github/actions/load-tfvars
        with:
          environment: ${{ env.TARGET_ENVIRONMENT }}

      - name: Create backend state RG/storage (${{ steps.env_config.outputs.state_rg }})
        uses: azure/powershell@v2
        with:
          inlineScript: |
            $tags = @{
              Environment      = "${{ steps.env_config.outputs.environment_id }}"
              Product          = "${{ steps.env_config.outputs.product }}"
              Service_Offering = "${{ steps.env_config.outputs.service_offering }}"
            }

            Write-Host "Using:"
            Write-Host "  Resource group:   ${{ steps.env_config.outputs.state_rg }}"
            Write-Host "  Storage account:  ${{ steps.env_config.outputs.state_storage }}"
            Write-Host "  Container:        ${{ steps.env_config.outputs.state_container }}"
            Write-Host "  Location:         ${{ steps.env_config.outputs.location }}"
            Write-Host "  Tags:             Environment=$(${tags['Environment']}), Product=$(${tags['Product']}), Service_Offering=$(${tags['Service_Offering']})"

            # Resource group
            New-AzResourceGroup -Name "${{ steps.env_config.outputs.state_rg }}" -Location "${{ steps.env_config.outputs.location }}" -Tag $tags -ErrorAction Stop | Out-Null

            # Storage account
            $storage = New-AzStorageAccount `
              -Name "${{ steps.env_config.outputs.state_storage }}" `
              -ResourceGroupName "${{ steps.env_config.outputs.state_rg }}" `
              -Location "${{ steps.env_config.outputs.location }}" `
              -SkuName Standard_LRS `
              -Kind StorageV2 `
              -MinimumTlsVersion TLS1_2 `
              -ErrorAction Stop

            # Container
            $ctx = $storage.Context
            $null = New-AzStorageContainer -Name "${{ steps.env_config.outputs.state_container }}" -Context $ctx -ErrorAction SilentlyContinue
          azPSVersion: "latest"
