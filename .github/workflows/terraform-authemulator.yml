name: Terraform Auth Emulator
run-name: Terraform Auth Emulator - ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: d01
        type: choice
        options:
          - d01
          - d02
          # Support for deployment to d03 is not required here, FaUAPI is used with AuthStore instead
      apply:
        description: Apply changes (otherwise plan only)
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform Auth Emulator for ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})
    uses: ./.github/workflows/terraform-plan-and-apply.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}
      root: terraform/auth-emulator
      state_key: ${{ format('{0}/authemulator.tfstate', inputs.environment) }}
