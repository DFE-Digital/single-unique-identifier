name: Terraform Service Example
run-name: Terraform Service Example - ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to target (matches tfvars name)
        required: true
        default: d01
        type: choice
        options:
          - d01
      apply:
        description: Apply changes (otherwise plan only)
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  service-example:
    name: Terraform service-example for ${{ inputs.environment }} (${{ inputs.apply && 'apply' || 'plan' }})
    # Prevent accidental execution; remove this line when copying this workflow
    if: ${{ false }}
    uses: ./.github/workflows/terraform-plan-and-apply.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      apply: ${{ inputs.apply }}
      root: terraform/service-example
      state_key: ${{ format('{0}/service-example.tfstate', inputs.environment) }}
